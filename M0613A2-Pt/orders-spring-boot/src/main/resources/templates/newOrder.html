<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/template :: head}"></head>

<body class="m-4">
	<section class="container">
		<header th:replace="~{fragments/template :: header}"></header>
		<nav th:replace="~{fragments/template :: navbar(newOrder)}"></nav>

		</div>
		<div class="row">
			<div class="col-md-6">
				<div class="card">
					<div class="card-header d-flex align-items-baseline">
						<h4 class="mb-0">
							<i class="bi bi-cart4"></i>
							<span>Selected items</span>
						</h4>
						<a href="/users/orders/newOrder/clearItems" class="btn btn-outline-secondary ms-auto">
							<i class="bi bi-x-circle"></i>
							<span>Clear</span>
						</a>
					</div>
					
					<div class="card-body">
					<!-- Iterate over the order items stored in session: order.items is a Map<Item,Integer> -->
					<div th:if="${#session.getAttribute('order') != null}">
						<div th:each="entry : ${#session.getAttribute('order').items.entrySet()}" class="d-flex flex-row align-items-center mb-2">
							<!-- entry.key = Item, entry.value = quantity -->
							<div class="flex-shrink-1 me-2">
								<img th:alt="${entry.key.name}"
									th:src="${'data:image/jpeg;base64,' + entry.key.base64Image}"
									class="media-object" style="width: 60px" />
							</div>
							<div class="flex-grow-1 d-flex flex-column">
								<div class="d-flex flex-row align-items-baseline">
									<span class="h6 me-2 mb-0" th:text="${entry.key.name}"></span>
									<small class="text-muted" th:text="${entry.key.price}"></small>
								</div>
								<div class="d-flex align-items-center">
									<span class="me-3">Qty: <strong th:text="${entry.value}"></strong></span>
									<a th:href="@{/users/orders/newOrder/increaseItem(reference=${entry.key.reference})}" class="link-secondary me-2">
										<i class="bi bi-plus-circle"></i>
									</a>
									<a th:href="@{/users/orders/newOrder/decreaseItem(reference=${entry.key.reference})}" class="link-secondary">
										<i class="bi bi-dash-circle"></i>
									</a>
								</div>
							</div>
						</div>
					</div>
					
					</div>
					<div class="card-footer d-grid d-md-block">
						<div>
							<a th:href="@{/users/orders/finishOrder}" class="btn btn-outline-secondary col-12" role="button">
								<i class="bi bi-bag-check-fill"></i>
								<span>Finish order</span>
							</a>
						</div>
					</div>
				</div>
			</div>

			<div class="col-md-6">
				<div class="card">
					<div class="card-header align-items-baseline">
						<h4>
							<i class="bi bi-list"></i> <span>Available items</span>
						</h4>
					</div>
					<div class="card-body">
						<div th:each="item : ${items}" class="d-flex flex-row">
							<div class="flex-shrink-1">
								<img th:alt="${item.name}"
									th:src="${'data:image/jpeg;base64,' + item.base64Image}"
									class="media-object" style="width: 60px" />
							</div>
							<div class="flex-grow-1 d-flex flex-column">
								<div class="d-flex flex-row align-items-baseline">
									<span class="h5 me-2 mb-0" th:text="${item.name}"></span> <small
										class="text-muted" th:text="${item.price}"></small>
								</div>
								<p th:text="${item.description}"></p>
						<div class="d-flex">
								<a th:href="@{/users/orders/newOrder/increaseItem(reference=${item.reference})}" class="link-secondary">
									<i class="bi bi-plus-circle"></i>
								</a>
								<a th:href="@{/users/orders/newOrder/decreaseItem(reference=${item.reference})}" class="link-secondary">
									<i class="bi bi-dash-circle"></i>
								</a>
							</div>
							</div>
						</div>
					</div>
				</div>
		</div>
	</section>
</body>
</html>
