<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link rel="stylesheet" th:href="@{/css/main.css}"
	href="../../static/css/main.css" />
<title th:text="#{template.head.title}">Orders</title>
</head>

<body>
	<div class="container">
		<header th:fragment="header"
			class="mb-4 p-5 bg-secondary-subtle bg-gradient rounded">
			<p class="display-1">
				<strong th:text="#{template.header.title}">Orders</strong>
			</p>
			<h3 th:text="#{template.header.subtitle}">An Institut Marianao
				application</h3>
		</header>

		<nav th:fragment="navbar(activePage)"
			class="navbar navbar-expand-lg sticky-top mb-4 bg-secondary-subtle bg-gradient rounded">
			<div class="container-fluid">
				<ul class="navbar-nav">
					<li class="navbar-brand" sec:authorize="isAuthenticated()"><i
						class="bi bi-person-fill"></i> <span
						sec:authentication="principal.firstName">username</span></li>

					<th:block sec:authorize="hasRole('USER')">
						<li class="nav-item"><a class="nav-link"
							th:href="@{/users/orders}"
							th:classappend="${activePage == 'orders'} ? 'active'"> <i
								class="bi bi-list-ol"></i> <span
								th:text="#{template.navbar.my.orders}">My orders</span>
						</a></li>

						<li class="nav-item"><a class="nav-link"
							th:href="@{/users/orders/newOrder}"
							th:classappend="${activePage == 'newOrder'} ? 'active'"> <i
								class="bi bi-plus-square-fill"></i> <span
								th:text="#{template.navbar.new.order}">New order</span>
						</a></li>

						<li class="nav-item"
							th:if="${order != null and order.items != null and !#maps.isEmpty(order.items)}">
							<a class="nav-link"
							th:href="@{/users/orders/finishOrder}"
							th:classappend="${activePage == 'finishOrder'} ? 'active'"> <i
								class="bi bi-bag-check-fill"></i> <span
								th:text="#{template.navbar.finish.order}">Finish order</span>
						</a>
						</li>

					</th:block>
				</ul>

				<ul class="navbar-nav">
					<li class="nav-item dropdown"><a
						class="nav-link dropdown-toggle" data-bs-toggle="dropdown"
						role="button" href="#"> <i class="bi bi-flag"></i> <span
							th:text="#{template.navbar.language}">Language</span>
					</a>
						<ul class="dropdown-menu">
							<li><a class="dropdown-item"
								th:classappend="${#locale.language == 'es'} ? 'disabled'"
								href="?language=es"> <i class="bi bi-globe"></i> <span
									th:text="#{template.navbar.language.spanish}">Spanish</span>
							</a></li>
							<li><a class="dropdown-item"
								th:classappend="${#locale.language == 'en'} ? 'disabled'"
								href="?language=en"> <i class="bi bi-globe"></i> <span
									th:text="#{template.navbar.language.english}">English</span>
							</a></li>
						</ul></li>
					<li class="nav-item" sec:authorize="isAuthenticated()"><a
						class="nav-link" th:href="@{/logout}"> <i
							class="bi bi-box-arrow-right"></i> <span
							th:text="#{template.navbar.logout}">Logout</span>
					</a></li>
				</ul>
			</div>
		</nav>
	</div>
</body>
</html>
