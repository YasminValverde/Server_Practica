<!DOCTYPE html>
<html lang="en" xmlns:th="https://wwww.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<link rel="stylesheet" th:href="@{/css/main.css}"
	href="../../static/css/main.css" />

<title>Parts</title>
</head>
<body>
	<div class="table-responsive" th:fragment="itemsTable(order)">
		<table class="table table-striped table-bordered table-condensed">
			<thead>
				<tr>
					<th th:text="#{parts.itemsTable.reference}">Ref</th>
					<th th:text="#{parts.itemsTable.item}">Item</th>
					<th th:text="#{parts.itemsTable.price}">Price</th>
					<th th:text="#{parts.itemsTable.quantity}">Qty</th>
					<th th:text="#{parts.itemsTable.amount}">Amount</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="entry : ${order.items}" th:with="item=${entry.key}, quantity=${entry.value}">
					<td th:text="${item.reference}"></td>
					<td th:text="${item.name}"></td>
					<td
						th:text="|${#numbers.formatDecimal(item.price, 1, 2, 'COMMA')} #{currency.symbol}|"></td>
					<td th:text="${entry.value}"></td>
					<td
						th:text="|${#numbers.formatDecimal(item.price * quantity, 1, 2, 'COMMA')} #{currency.symbol}|"></td>
				</tr>
				<tr class="table-secondary">
					<td colspan="3" style="text-align: right"><strong
						th:text="#{parts.itemsTable.total}">Total</strong></td>
					<td><strong th:text="${order.totalQuantity}">0</strong></td>
					<td><strong
						th:text="|${#numbers.formatDecimal(order.totalAmount, 1, 2, 'COMMA')} #{currency.symbol}|">0.00
							€</strong></td>
				</tr>
			</tbody>
		</table>
	</div>
</body>
