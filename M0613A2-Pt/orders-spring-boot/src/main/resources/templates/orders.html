<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/template :: head}"></head>

<body class="m-4">
<div class="container">
    <header th:replace="~{fragments/template :: header}"></header>
    <nav th:replace="~{fragments/template :: navbar(orders)}"></nav>

    <table class="table table-striped table-bordered table-condensed table-responsive">
        <thead>
        <tr>

            <th th:text="#{orders.client}" sec:authorize="hasRole('ADMIN')">Client</th>
            <th th:text="#{orders.reference}">Reference</th>
            <th th:text="#{orders.deliveryAddress}">Delivery address</th>
            <th th:text="#{orders.startDate}">Start date</th>
            <th th:text="#{orders.state}">State</th>
            <th th:text="#{orders.deliveryDate}">Delivery date</th>
            <th th:text="#{orders.details}">Details</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${orders == null or orders.empty}" sec:authorize="hasRole('USER')">
            <td colspan="7" th:text="#{orders.user.no.orders}">You haven't placed any orders yet.</td>
        </tr>


        <tr th:each="order : ${orders}"
            th:if="${orders != null and !orders.empty}"
            sec:authorize="hasRole('USER')">
            <td th:text="${order.reference}">00000001</td>

            <td>

                <span th:text="${order.deliveryAddress.recipientName}">Recipient</span><br>
                <span th:text="${order.deliveryAddress.address}">Address</span><br>
                <span th:text="${order.deliveryAddress.zipCode + ' ' + order.deliveryAddress.city}">Zip City</span><br>
                <span th:text="${order.deliveryAddress.state}">State</span><br>
                <span th:text="${order.deliveryAddress.country}">Country</span>
            </td>

            <td th:text="${order.startDate}">2026-02-19</td>
            <td th:text="${order.status}">PENDING</td>
            <td th:text="${order.deliveryDate}">2026-02-28</td>
            <td></td>
        </tr>


        <tr th:if="${orders == null or orders.empty}" sec:authorize="hasRole('ADMIN')">
            <td colspan="7" th:text="#{orders.admin.no.orders}">There are no orders in the system.</td>
        </tr>


        <tr th:each="order : ${orders}" sec:authorize="hasRole('ADMIN')">

            <td th:text="${order.client != null ? (order.client.firstName + ' ' + order.client.lastName) : '—'}">Client</td>


            <td th:text="${order.reference}">00000001</td>

            <td>
                <span th:text="${order.deliveryAddress.recipientName}">Recipient</span><br>
                <span th:text="${order.deliveryAddress.address}">Address</span><br>
                <span th:text="${order.deliveryAddress.zipCode + ' ' + order.deliveryAddress.city}">Zip City</span><br>
                <span th:text="${order.deliveryAddress.state}">State</span><br>
                <span th:text="${order.deliveryAddress.country}">Country</span>
            </td>


            <td th:text="${order.startDate}">2026-02-19</td>


            <td>
                <form th:action="@{/admin/orders/setStatus}" method="post">
                    <select name="status" class="form-select" onchange="this.form.submit();">
                        <option th:each="st : ${orderStatus}"
                                th:value="${st}"
                                th:text="${st}"
                                th:selected="${st == order.status}">
                        </option>
                    </select>
                    <input type="hidden" name="reference" th:value="${order.reference}">
                </form>
            </td>


            <td>
                <form th:action="@{/admin/orders/setDelivery}" method="post">
                    <input type="date"
                           name="deliveryDate"
                           class="form-control"
                           th:value="${order.deliveryDate != null ? #dates.format(order.deliveryDate, 'yyyy-MM-dd') : null}"
                           th:attr="min=${order.startDate != null ? #dates.format(order.startDate, 'yyyy-MM-dd') : null}"
                           onchange="this.form.submit();">
                    <input type="hidden" name="reference" th:value="${order.reference}">
                </form>
            </td>

            <td></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
