<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/template :: head}"></head>

<body class="m-4">
	<div class="container">
		<header th:replace="~{fragments/template :: header}"></header>
		<nav th:replace="~{fragments/template :: navbar(finishOrder)}"></nav>

		<!--/* TODO finish order form with address fields, according to requirements */-->
		<form action="/users/orders/newOrder/finishOrder" method="post"
			class="form-horizontal">
			<div class="container">
				<div class="row card">
					<div class="card-header">
						<h4>
							<i class="bi bi-grid-3x3-gap-fill"></i> <span>Order</span>
						</h4>
					</div>
					<div class="card-body">
						<div class="row">
							<div class="col-md-5">
								<h5>
									<i class="bi bi-person-fill"></i> <span>Client data</span>
								</h5>
								<div class="mb-1 row align-items-baseline align-items-baseline">
									<span class="col-sm-4 form-label">First name</span>
									<div class="col-sm-8">
										<p class="form-control-static">Lisa</p>
									</div>
								</div>
								<div
									class="mb-1 row align-items-baseline align-items-baseline border-bottom mb-3 pb-2">
									<span class="col-sm-4 form-label">Last name</span>
									<div class="col-sm-8">
										<p class="form-control-static">Brennan-Jobs</p>
									</div>
								</div>

								<h5>
									<i class="bi bi-envelope"></i> <span>Shipment data</span>
								</h5>

								<div class="mb-1 row align-items-baseline">
									<label class="col-sm-4 form-label"
										for="deliveryAddress.recipientName">Recipient</label>
									<div class="col-sm-8">
										<input type="text" class="form-control"
											placeholder="Recipient name"
											id="deliveryAddress.recipientName"
											name="deliveryAddress.recipientName" value="">
									</div>
								</div>

								<div class="mb-1 row align-items-baseline">
									<label class="col-sm-4 form-label"
										for="deliveryAddress.address">Address</label>
									<div class="col-sm-8">
										<input type="text" class="form-control"
											placeholder="Street, number, floor..."
											id="deliveryAddress.address" name="deliveryAddress.address"
											value="">
									</div>
								</div>

								<div class="mb-1 row align-items-baseline">
									<label class="col-sm-4 form-label"
										for="deliveryAddress.zipCode">Zip code</label>
									<div class="col-sm-8">
										<input type="text" class="form-control"
											placeholder="E.g.: 95014" id="deliveryAddress.zipCode"
											name="deliveryAddress.zipCode" value="">
									</div>
								</div>

								<div class="mb-1 row align-items-baseline">
									<label class="col-sm-4 form-label" for="deliveryAddress.city">City</label>
									<div class="col-sm-8">
										<input type="text" class="form-control"
											placeholder="City or municipality" id="deliveryAddress.city"
											name="deliveryAddress.city" value="">
									</div>
								</div>

								<div class="mb-1 row align-items-baseline">
									<label class="col-sm-4 form-label" for="deliveryAddress.state">State/Province</label>
									<div class="col-sm-8">
										<input type="text" class="form-control"
											placeholder="Province or state" id="deliveryAddress.state"
											name="deliveryAddress.state" value="">
									</div>
								</div>

								<div class="mb-1 row align-items-baseline">
									<label class="col-sm-4 form-label"
										for="deliveryAddress.country">Country</label>
									<div class="col-sm-8">
										<input type="text" class="form-control"
											placeholder="Delivery country" id="deliveryAddress.country"
											name="deliveryAddress.country" value="">
									</div>
								</div>
							</div>

							<div class="col-md-7">
								<h5>
									<i class="bi bi-list"></i> <span>Items summary</span>
								</h5>
								<div class="table-responsive">
									<table
										class="table table-striped table-bordered table-condensed">
										<thead>
											<tr>
												<th>Ref.</th>
												<th>Item</th>
												<th>Price</th>
												<th>Qty.</th>
												<th>Amount</th>
											</tr>
										</thead>
										<tbody>
											<tr>
												<td>1</td>
												<td>Big Pig</td>
												<td>23,90 €</td>
												<td>6</td>
												<td>143,40 €</td>
											</tr>
											<tr>
												<td>2</td>
												<td>Silly Monkey</td>
												<td>24,90 €</td>
												<td>1</td>
												<td>24,90 €</td>
											</tr>
											<tr class="table-secondary">
												<td colspan="3" style="text-align: right"><strong>Total</strong></td>
												<td><strong>7</strong></td>
												<td><strong>168,30 €</strong></td>
											</tr>
										</tbody>
									</table>
								</div>
							</div>
						</div>
					</div>
					<div class="card-footer d-grid d-md-block">
						<button type="submit" id="btnAdd"
							class="btn btn-outline-secondary d-grid col-6 mx-auto d-md-block">
							<i class="bi bi-credit-card"></i> <span>Purchase</span>
						</button>
					</div>
				</div>
			</div>
		</form>
	</div>
</body>
</html>
