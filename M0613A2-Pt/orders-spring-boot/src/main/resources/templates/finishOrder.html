<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/template :: head}"></head>

<body class="m-4">
  <div class="container">
    <header th:replace="~{fragments/template :: header}"></header>
    <nav th:replace="~{fragments/template :: navbar(finishOrder)}"></nav>

    <!-- FORMULARIO CORRECTO (apertura y cierre) -->
    <form th:action="@{/users/orders/finishOrder}" method="post" class="form-horizontal">

      <div class="container">
        <div class="row card">
          <div class="card-header">
            <h4>
              <i class="bi bi-grid-3x3-gap-fill"></i> <span>Order</span>
            </h4>
          </div>

          <div class="card-body">
            <div class="row">

              <!-- Izquierda: datos del cliente + dirección -->
              <div class="col-md-5">
                <h5>
                  <i class="bi bi-person-fill"></i> <span>Client data</span>
                </h5>

                <div class="mb-1 row align-items-baseline">
                  <span class="col-sm-4 form-label">First name</span>
                  <div class="col-sm-8">
                    <p class="form-control-static">Lisa</p>
                  </div>
                </div>

                <div class="mb-1 row align-items-baseline border-bottom mb-3 pb-2">
                  <span class="col-sm-4 form-label">Last name</span>
                  <div class="col-sm-8">
                    <p class="form-control-static">Brennan Jobs</p>
                  </div>
                </div>

                <h5>
                  <i class="bi bi-envelope"></i> <span>Shipment data</span>
                </h5>

                <!-- Recipient -->
                <div class="mb-1 row align-items-baseline">
                  <label class="col-sm-4 form-label" for="deliveryAddress.recipientName">Recipient</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control"
                           placeholder="Recipient name"
                           id="deliveryAddress.recipientName"
                           name="deliveryAddress.recipientName" />
                  </div>
                </div>

                <!-- Address -->
                <div class="mb-1 row align-items-baseline">
                  <label class="col-sm-4 form-label" for="deliveryAddress.address">Address</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control"
                           placeholder="Street, number, floor..."
                           id="deliveryAddress.address"
                           name="deliveryAddress.address" />
                  </div>
                </div>

                <!-- Zip code -->
                <div class="mb-1 row align-items-baseline">
                  <label class="col-sm-4 form-label" for="deliveryAddress.zipCode">Zip code</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control"
                           placeholder="95014"
                           id="deliveryAddress.zipCode"
                           name="deliveryAddress.zipCode" />
                  </div>
                </div>

                <!-- City -->
                <div class="mb-1 row align-items-baseline">
                  <label class="col-sm-4 form-label" for="deliveryAddress.city">City</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control"
                           placeholder="City"
                           id="deliveryAddress.city"
                           name="deliveryAddress.city" />
                  </div>
                </div>

                <!-- State -->
                <div class="mb-1 row align-items-baseline">
                  <label class="col-sm-4 form-label" for="deliveryAddress.state">State</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control"
                           placeholder="State"
                           id="deliveryAddress.state"
                           name="deliveryAddress.state" />
                  </div>
                </div>

                <!-- Country -->
                <div class="mb-1 row align-items-baseline">
                  <label class="col-sm-4 form-label" for="deliveryAddress.country">Country</label>
                  <div class="col-sm-8">
                    <input type="text" class="form-control"
                           placeholder="Country"
                           id="deliveryAddress.country"
                           name="deliveryAddress.country" />
                  </div>
                </div>
              </div>

              <!-- Derecha: resumen de items -->
              <div class="col-md-7">
                <h5>
                  <i class="bi bi-list"></i> <span>Items summary</span>
                </h5>

                <div class="table-responsive">
                  <table class="table table-striped table-bordered table-condensed">
                    <thead>
                      <tr>
                        <th>Ref.</th>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty.</th>
                        <th>Amount</th>
                      </tr>
                    </thead>

                    <tbody>
                      <!-- Iterar los items del pedido (importe de línea sin lambdas) -->
                      <tr th:each="entry : ${order.items.entrySet()}"
                          th:with="lineAmount=${entry.key.price * entry.value}">
                        <td th:text="${entry.key.reference}">1</td>
                        <td th:text="${entry.key.name}">Item</td>
                        <td th:text="${entry.key.price}">0.00</td>
                        <td th:text="${entry.value}">1</td>
                        <td th:text="${#numbers.formatDecimal(lineAmount, 1, 'POINT', 2, 'POINT')}">0.00</td>
                      </tr>

                      <!-- Totales: usan getters del modelo Order (sin streams en Thymeleaf) -->
                      <tr class="table-secondary">
                        <td colspan="3" class="text-end"><strong>Total</strong></td>
                        <td><strong th:text="${order.totalQuantity}">0</strong></td>
                        <td><strong th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'POINT', 2, 'POINT')}">0.00</strong></td>
                      </tr>
                    </tbody>

                  </table>
                </div>
              </div>

            </div>
          </div>

          <!-- BOTÓN EN EL FOOTER -->
          <div class="card-footer d-grid d-md-block">
            <button type="submit" class="btn btn-outline-secondary d-grid col-6 mx-auto d-md-block">
              <i class="bi bi-credit-card"></i> <span>Purchase</span>
            </button>
          </div>

        </div>
      </div>

    </form>
  </div>
</body>
</html>
``
